name: CI

# Chạy workflow khi push hoặc pull request vào main
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # Job kiểm tra code quality và testing
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      # Checkout code từ repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js environment
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # Cài đặt dependencies
      - name: Install dependencies
        run: npm ci

      # Chạy linting
      - name: Run linter
        run: npm run lint

      # Kiểm tra TypeScript
      - name: Type check
        run: npm run type-check

      # Chạy tests
      # - name: Run tests
      #   run: npm run test

      # Build project để verify
      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production
          BACKEND_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: /api/v1