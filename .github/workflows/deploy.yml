name: Deploy Frontend

on:
  push:
    branches:
      - main

env:
  # Tên image chung để tái sử dụng trong các step build và deploy.
  IMAGE_NAME: fe-deploy-platform

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      # Workflow chỉ cần quyền đọc source code để build image.
      contents: read

    steps:
      # Lấy source code của commit vừa push để dùng làm build context.
      - name: Checkout code
        uses: actions/checkout@v4

      # Tạo sẵn repo image và tag theo commit SHA để các step sau dùng lại.
      - name: Set image tags
        id: image
        run: |
          echo "repository=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      # Bật Buildx để build Docker image hiện đại và hỗ trợ cache/tính năng build tốt hơn.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Đăng nhập Docker Hub trước khi push image.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build image từ Dockerfile rồi push lên Docker Hub với 2 tag:
      # - latest cho deploy mặc định
      # - commit SHA để truy vết version cụ thể khi cần rollback/debug
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.repository }}:latest
            ${{ steps.image.outputs.repository }}:${{ steps.image.outputs.sha_tag }}
          build-args: |
            BACKEND_URL=${{ vars.BACKEND_URL || 'http://localhost:3000' }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || '/api/v1' }}
            NEXT_PUBLIC_SSE_URL=${{ vars.NEXT_PUBLIC_SSE_URL || 'http://localhost:3000' }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL || 'http://localhost:5000' }}

      # SSH vào VPS, pull image mới nhất, sau đó restart riêng service frontend.
      - name: SSH deploy frontend
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Thêm host key của VPS vào known_hosts để tránh prompt xác nhận interactive.
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

          ssh -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << EOF
            set -e

            # Kiểm tra VPS có thể lấy được image mới nhất từ Docker Hub.
            docker pull ${{ steps.image.outputs.repository }}:latest

            cd /opt/mini-deploy/mini-deploy-infra

            # Cập nhật image cho service frontend và khởi động lại container mà không rebuild trên VPS.
            docker compose pull frontend
            docker compose up -d --no-build frontend

            # In trạng thái service sau deploy để dễ kiểm tra nhanh.
            docker compose ps
          EOF
